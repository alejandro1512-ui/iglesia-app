<!DOCTYPE html>
<html lang="es">
<head>
    <title>IBV — Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ibv-blue: #4a6478;
            --ibv-cream: #e8e0d0;
            --ibv-gray: #8a9aa8;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background-color: #1a2330;">

    <div class="w-full max-w-md px-8">

        <!-- Logo y título -->
        <div class="text-center mb-10">
            <img src="/static/logo.png" alt="IBV" class="w-24 h-24 mx-auto mb-4 rounded-full">
            <h1 class="text-3xl font-bold" style="color: #e8e0d0;">Iglesia Buena Vista</h1>
            <p class="mt-2" style="color: #8a9aa8;">Inicia sesión para continuar</p>
        </div>

        <!-- Formulario -->
        <div class="rounded-2xl p-8" style="background-color: #243040;">
            
            <div class="mb-5">
                <label class="block text-sm font-medium mb-2" style="color: #8a9aa8;">
                    Correo electrónico
                </label>
                <input 
                    id="email"
                    type="email" 
                    placeholder="tu@email.com"
                    class="w-full px-4 py-3 rounded-xl border outline-none transition"
                    style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;"
                >
            </div>

            <div class="mb-8">
                <label class="block text-sm font-medium mb-2" style="color: #8a9aa8;">
                    Contraseña
                </label>
                <input 
                    id="password"
                    type="password" 
                    placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-xl border outline-none transition"
                    style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;"
                >
            </div>

            <button 
                id="btnLogin"
                class="w-full py-3 rounded-xl font-semibold transition hover:opacity-90"
                style="background-color: #4a6478; color: #e8e0d0;"
            >
                Iniciar sesión
            </button>

            <p id="error" class="text-red-400 text-sm text-center mt-4 hidden"></p>

        </div>

    </div>

    <script>
        const btnLogin = document.getElementById("btnLogin")
        const emailInput = document.getElementById("email")
        const passwordInput = document.getElementById("password")
        const errorMsg = document.getElementById("error")

        btnLogin.addEventListener("click", async function() {
            const email = emailInput.value
            const password = passwordInput.value

            if (!email || !password) {
                errorMsg.textContent = "Por favor llena todos los campos"
                errorMsg.classList.remove("hidden")
                return
            }

            btnLogin.textContent = "Iniciando sesión..."
            btnLogin.disabled = true

            try {
                const respuesta = await fetch("http://127.0.0.1:8000/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                })

                const datos = await respuesta.json()

                if (!respuesta.ok) {
                    throw new Error(datos.detail)
                }

                // Guardar token y rol
                localStorage.setItem("token", datos.token)
                localStorage.setItem("rol", datos.rol)
                localStorage.setItem("iglesia", datos.iglesia)

                if (datos.rol === "super_admin" || datos.rol === "pastor") {
                    window.location.href = "/admin"
                } else {
                    window.location.href = "/pantalla"
                }

            } catch (error) {
                errorMsg.textContent = "Credenciales incorrectas"
                errorMsg.classList.remove("hidden")
                btnLogin.textContent = "Iniciar sesión"
                btnLogin.disabled = false
            }
        })
    </script>
</body>
</html>
