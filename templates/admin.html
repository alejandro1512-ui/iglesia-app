<!DOCTYPE html>
<html lang="es">
<head>
    <title>Anuncios de Iglesia Buena Vista</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">
            Admin - Anuncios IBV
        </h1>

        <div class="bg-white rounded-xl shadow p-6 mb-8">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Nuevo anuncio</h2>
            <div class="flex gap-3">
                <input 
                    id="textoAnuncio"
                    type="text"
                    placeholder="Ej. Reunion viernes 7pm"
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                <button
                    id="btnEnviar"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition"
                >
                    Agregar
                </button>    
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Anuncios actuales</h2>
            <div id="listaAnuncios"></div>
        </div>
    </div>
    <script>
        const btnEnviar = document.getElementById("btnEnviar")
        const inputNombre = document.getElementById("textoAnuncio")

        // Cargar y mostrar anuncios
        async function cargarAnuncios() {
            const respuesta = await fetch("https://anuncios-ibv-production.up.railway.app/anuncios")
            const datos = await respuesta.json()
            
            const lista = document.getElementById("listaAnuncios")
            lista.innerHTML = ""
            
            datos.forEach(function(anuncio) {
                const contenedor = document.createElement("div")
                contenedor.className = "flex items-center justify-between py-3 border-b border-gray-100"

                const textoSpan = document.createElement("span")
                textoSpan.textContent = anuncio.texto
                textoSpan.className = "text-gray-700"

                const btnEliminar = document.createElement("button")
                btnEliminar.textContent = "Eliminar"
                btnEliminar.className = "bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition text-sm ml-3"
                btnEliminar.addEventListener("click", function() {
                    eliminarAnuncio(anuncio.id)
                })

                const btnUpdate = document.createElement("button")
                btnUpdate.textContent = "Editar"
                btnUpdate.className = "bg-yellow-500 text-white px-3 py-1 rounded-lg hover:bg-yellow-600 transition text-sm ml-2"
                btnUpdate.addEventListener("click", function() {
                    const nuevoTexto = prompt("Nuevo texto del anuncio:")
                    updateAnuncio(anuncio.id, nuevoTexto)
                })

                const botones = document.createElement("div")
                botones.appendChild(btnEliminar)
                botones.appendChild(btnUpdate)

                contenedor.appendChild(textoSpan)
                contenedor.appendChild(botones)
                lista.appendChild(contenedor)
            })
        }

        // Agregar anuncio
        btnEnviar.addEventListener("click", async function() {
            const respuesta = await fetch("https://anuncios-ibv-production.up.railway.app/anuncios", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({texto: inputNombre.value})
            })
            inputNombre.value = ""
            cargarAnuncios()
        })

         // Eliminar anuncio
        async function eliminarAnuncio(id) {
            await fetch("https://anuncios-ibv-production.up.railway.app/anuncios", {
                method: "DELETE",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({id: id})
            })
            cargarAnuncios()
        }

        // Actualizar anuncio
        async function updateAnuncio(id, nuevoTexto) {
            await fetch("https://anuncios-ibv-production.up.railway.app/anuncios", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({elID: id, nuevo_texto: nuevoTexto})
            })
            cargarAnuncios()
        }
        
        cargarAnuncios()
    </script>
</body>
</html>
