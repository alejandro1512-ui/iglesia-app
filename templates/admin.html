<!DOCTYPE html>
<html lang="es">
<head>
    <title>IBV — Panel de Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        .nav-btn {
            transition: all 0.2s ease;
        }
        .nav-btn:hover {
            background-color: rgba(74, 100, 120, 0.5) !important;
            box-shadow: inset 0 0 0 1px rgba(74, 100, 120, 0.8);
        }
        .nav-btn.activo {
            background-color: #4a6478;
        }
        #sidebar.w-16 .avatar-circle {
            margin: 0 auto;
        }

        /* Tabs de células */
        button[id^="tab-"] {
            transition: all 0.2s ease;
        }
        button[id^="tab-"]:hover {
            filter: brightness(1.3);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        /* Botón PDF */
        button[onclick^="exportarPDF"] {
            transition: all 0.2s ease;
        }
        button[onclick^="exportarPDF"]:hover {
            background-color: #3a6a40 !important;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        /* Botón Eliminar reporte */
        button[onclick^="eliminarReporte"] {
            transition: all 0.2s ease;
        }
        button[onclick^="eliminarReporte"]:hover {
            background-color: #6a2030 !important;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex" style="background-color: #1a2330;">

    <!-- Sidebar -->
    <aside id="sidebar" class="relative w-64 min-h-screen flex flex-col transition-all duration-300" style="background-color: #243040;">
        
        <!-- Logo -->
        <div id="logo-header-container" class="p-6 border-b transition-all duration-300" style="border-color: #4a6478;">
            <div class="logo-inner-flex flex items-center gap-3 overflow-hidden transition-all duration-300">
                <img src="/static/logo.png" alt="IBV" class="w-10 h-10 rounded-full flex-shrink-0">
                
                <div class="sidebar-extra whitespace-nowrap transition-opacity duration-300">
                    <h2 class="font-bold text-sm" style="color: #e8e0d0;">Iglesia Buena Vista</h2>
                    <p class="text-xs" style="color: #8a9aa8;">Panel de Admin</p>
                </div>
            </div>
        </div>

        <!-- Navegación -->
        <nav class="flex-1 p-4">
            <ul class="space-y-1">
                <li>
                    <button onclick="mostrarSeccion('dashboard')" id="nav-dashboard"
                        class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition hover:bg-[#4a6478]/50"
                        style="color: #e8e0d0; background-color: #4a6478;"> <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                        <span class="nav-texto sidebar-extra">Dashboard</span>
                    </button>
                </li>
                <li>
                    <button onclick="mostrarSeccion('anuncios')" id="nav-anuncios"
                        class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition hover:bg-[#4a6478]/50"
                        style="color: #e8e0d0;">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
                        </svg>
                        <span class="nav-texto sidebar-extra">Anuncios</span>
                    </button>
                </li>
                <li>
                    <button onclick="mostrarSeccion('miembros')" id="nav-miembros"
                        class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition hover:bg-[#4a6478]/50"
                        style="color: #e8e0d0;">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span class="nav-texto sidebar-extra">Miembros</span>
                    </button>
                </li>
                <li>
                    <button onclick="mostrarSeccion('celulas')" id="nav-celulas"
                        class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition hover:bg-[#4a6478]/50"
                        style="color: #e8e0d0;">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        <span class="nav-texto sidebar-extra">Células</span>
                    </button>
                </li>
                <li>
                    <button onclick="mostrarSeccion('configuracion')" id="nav-configuracion"
                        class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition hover:bg-[#4a6478]/50"
                        style="color: #e8e0d0;">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        <span class="nav-texto sidebar-extra">Configuracion</span>
                    </button>
                </li>
            </ul>
        </nav>

        <!-- Usuario y cerrar sesión -->
        <div class="p-4 border-t" style="border-color: #4a6478;">
            <div class="flex items-center gap-3 mb-3">
                <div class="avatar-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold min-w-[32px] flex-shrink-0"
                    style="background-color: #4a6478; color: #e8e0d0;">
                    A
                </div>
                <div class="sidebar-extra whitespace-nowrap transition-opacity duration-300">
                    <p class="text-xs font-medium" style="color: #e8e0d0;" id="nombreUsuario">Admin</p>
                    <p class="text-xs" style="color: #8a9aa8;" id="rolUsuario">super_admin</p>
                </div>
            </div>
            <button onclick="cerrarSesion()"
                class="w-full text-left px-4 py-2 rounded-xl text-sm transition hover:bg-[#4a2030]/80 flex items-center gap-3 overflow-hidden whitespace-nowrap"
                style="color: #e8e0d0;">
                <svg class="w-5 h-5 flex-shrink-0 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="sidebar-extra">Cerrar sesión</span>
            </button>
        </div>
        <button onclick="toggleSidebar()" 
            class="absolute -right-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full flex items-center justify-center border transition-all hover:scale-110 z-50"
            style="background-color: #1a2330; border-color: #4a6478; color: #8a9aa8;">
            <svg id="icono-toggle" class="w-4 h-4 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
    </aside>

    <!-- Contenido principal -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold" style="color: #e8e0d0;" id="tituloSeccion">Dashboard</h1>
            <p class="text-sm mt-1" style="color: #8a9aa8;" id="subtituloSeccion">Resumen general</p>
        </div>

        <!-- Secciones -->
        <div id="seccion-dashboard">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

                <div class="rounded-xl p-6 border shadow-lg transition-transform hover:-translate-y-1" style="background-color: #243040; border-color: rgba(74,100,120,0.4);">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium" style="color: #8a9aa8;">Total miembros</p>
                            <p class="text-3xl font-bold mt-2" style="color: #e8e0d0;" id="totalMiembros">—</p>
                        </div>
                        <div class="p-2 rounded-lg" style="background-color: #4a6478; color: #e8e0d0;">
                            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                        </div>
                    </div>
                </div>

                <div class="rounded-xl p-6 border shadow-lg transition-transform hover:-translate-y-1" style="background-color: #243040; border-color: rgba(74,100,120,0.4);">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm font-medium" style="color: #8a9aa8;">Células activas</p>
                            <p class="text-3xl font-bold mt-2" style="color: #e8e0d0;" id="totalCelulas">—</p>
                        </div>
                        <div class="p-2 rounded-lg" style="background-color: #4a6478; color: #e8e0d0;">
                            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                        </div>
                    </div>
                </div>

                <div class="rounded-xl p-6 border shadow-lg transition-transform hover:-translate-y-1" style="background-color: #243040; border-color: rgba(74,100,120,0.4);">
                    <p class="text-sm font-medium" style="color: #8a9aa8;">Iglesia</p>
                    <p class="text-xl font-bold mt-2 truncate" style="color: #e8e0d0;" id="nombreIglesia">—</p>
                </div>

            </div>
        </div>

        <div id="seccion-anuncios" class="hidden">
            <div class="rounded-xl p-6" style="background-color: #243040;">
                <div class="flex gap-3 mb-6">
                    <input id="textoAnuncio" type="text" placeholder="Nuevo anuncio..."
                        class="flex-1 px-4 py-2 rounded-xl border outline-none"
                        style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                    <button id="btnEnviar"
                        class="px-6 py-2 rounded-xl font-semibold transition hover:opacity-90"
                        style="background-color: #4a6478; color: #e8e0d0;">
                        Agregar
                    </button>
                </div>
                <div id="listaAnuncios"></div>
            </div>
        </div>
        
        <div id="seccion-miembros" class="hidden">
            <div class="rounded-xl p-6" style="background-color: #243040;">
                
                <!-- Agregar miembro -->
                <div class="flex gap-3 mb-6">
                    <input id="emailMiembro" type="email" placeholder="Email del nuevo miembro"
                        class="flex-1 px-4 py-2 rounded-xl border outline-none"
                        style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                    <input id="passwordMiembro" type="password" placeholder="Contraseña"
                        class="w-40 px-4 py-2 rounded-xl border outline-none"
                        style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                    <select id="rolMiembro"
                        class="px-4 py-2 rounded-xl border outline-none"
                        style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        <option value="miembro">Miembro</option>
                        <option value="lider_celula">Líder célula</option>
                        <option value="pastor">Pastor</option>
                    </select>
                    <button id="btnAgregarMiembro"
                        class="px-6 py-2 rounded-xl font-semibold transition hover:opacity-90"
                        style="background-color: #4a6478; color: #e8e0d0;">
                        Agregar
                    </button>
                </div>

                <!-- Lista de miembros -->
                <div id="listaMiembros"></div>

            </div>
        </div>

        <div id="seccion-celulas" class="hidden">

            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
                <button onclick="mostrarTabCelula('lista')" id="tab-lista"
                    class="px-4 py-2 rounded-xl text-sm font-medium transition"
                    style="background-color: #4a6478; color: #e8e0d0;">
                    Lista de células
                </button>
                <button onclick="mostrarTabCelula('reporte')" id="tab-reporte"
                    class="px-4 py-2 rounded-xl text-sm font-medium transition"
                    style="background-color: #1a2330; color: #8a9aa8;">
                    Nuevo reporte
                </button>
                <button onclick="mostrarTabCelula('ver-reportes')" id="tab-ver-reportes"
                    class="px-4 py-2 rounded-xl text-sm font-medium transition"
                    style="background-color: #1a2330; color: #8a9aa8;">
                    Ver reportes
                </button>
            </div>

            <!-- Tab: Lista de células -->
            <div id="tab-contenido-lista">
                <div class="rounded-xl p-6" style="background-color: #243040;">
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Nombre de la célula</label>
                            <input id="nombreCelula" type="text" placeholder="Ej: Célula 1"
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Red (opcional)</label>
                            <select id="redCelula" class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                                <option value="">Sin red</option>
                                <option value="Juvenil">Juvenil</option>
                                <option value="DNA">DNA</option>
                                <option value="Varones">Varones</option>
                                <option value="Damas">Damas</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Sector</label>
                            <input id="sectorCelula" type="text" placeholder="Ej: Norte"
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Zona</label>
                            <input id="zonaCelula" type="text" placeholder="Ej: Zona 1"
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Nombre del líder</label>
                            <input id="liderCelula" type="text" placeholder="Nombre completo"
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Nombre del asistente</label>
                            <input id="asistenteCelula" type="text" placeholder="Nombre completo"
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Nombre del anfitrión</label>
                            <input id="anfitrionCelula" type="text" placeholder="Nombre completo"
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                        <div>
                            <label class="text-xs mb-1 block" style="color: #8a9aa8;">Email del líder (opcional)</label>
                            <input id="emailLiderCelula" type="email" placeholder="email@ejemplo.com"
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                    </div>
                    <button id="btnAgregarCelula"
                        class="px-6 py-2 rounded-xl font-semibold transition hover:opacity-90 mb-6"
                        style="background-color: #4a6478; color: #e8e0d0;">
                        Agregar Célula
                    </button>
                    <div id="listaCelulas"></div>
                </div>
            </div>

            <!-- Tab: Nuevo reporte -->
            <div id="tab-contenido-reporte" class="hidden">
                <div class="rounded-xl p-6" style="background-color: #243040;">
                    
                    <!-- Info general -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="text-sm mb-1 block" style="color: #8a9aa8;">Célula</label>
                            <select id="reporteCelulaId" class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                            </select>
                        </div>
                        <div>
                            <label class="text-sm mb-1 block" style="color: #8a9aa8;">Fecha</label>
                            <input id="reporteFecha" type="date" class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #e8e0d0;">
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div>
                            <label class="text-sm mb-1 block" style="color: #8a9aa8;">Red</label>
                            <input id="r_red" type="text" readonly
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #8a9aa8;">
                        </div>
                        <div>
                            <label class="text-sm mb-1 block" style="color: #8a9aa8;">Sector</label>
                            <input id="r_sector" type="text" readonly
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #8a9aa8;">
                        </div>
                        <div>
                            <label class="text-sm mb-1 block" style="color: #8a9aa8;">Zona</label>
                            <input id="r_zona" type="text" readonly
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #8a9aa8;">
                        </div>
                        <div>
                            <label class="text-sm mb-1 block" style="color: #8a9aa8;">Nombre del líder</label>
                            <input id="r_nombre_lider" type="text" readonly
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #8a9aa8;">
                        </div>
                        <div>
                            <label class="text-sm mb-1 block" style="color: #8a9aa8;">Nombre del asistente</label>
                            <input id="r_nombre_asistente" type="text" readonly
                                class="w-full px-4 py-2 rounded-xl border outline-none"
                                style="background-color: #1a2330; border-color: #4a6478; color: #8a9aa8;">
                        </div>

    <script>
        const API = "http://127.0.0.1:8000"
        const token = localStorage.getItem("token")
        const rol = localStorage.getItem("rol")
        const iglesia = localStorage.getItem("iglesia")

        // Si no hay token, redirigir al login
        if (!token) window.location.href = "/login"

        // Mostrar info del usuario
        document.getElementById("rolUsuario").textContent = rol
        document.getElementById("nombreIglesia").textContent = iglesia

        // Headers con token
        const headers = {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        }

        // Cargar dashboard
        async function cargarDashboard() {
            const totales = await fetch(`${API}/dashboard/totales`, { headers }).then(r => r.json())
            document.getElementById("totalMiembros").textContent = totales.total_miembros
            document.getElementById("totalCelulas").textContent = totales.celulas_activas
            document.getElementById("nombreIglesia").textContent = localStorage.getItem("iglesia")
        }

        // Navegación
        function mostrarSeccion(seccion) {
            // Ocultar todas las secciones
            document.querySelectorAll('[id^="seccion-"]').forEach(el => el.classList.add("hidden"));
            // Mostrar la seleccionada
            document.getElementById(`seccion-${seccion}`).classList.remove("hidden");
            
            // --- NUEVO: Actualizar el estado visual del menú ---
            // 1. Quitar el color de fondo a todos los botones
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.style.backgroundColor = "transparent";
            });
            // 2. Ponerle el color azul al botón que acabamos de clickear
            const btnActivo = document.getElementById(`nav-${seccion}`);
            if (btnActivo) {
                btnActivo.style.backgroundColor = "#4a6478";
            }
            // ---------------------------------------------------

            const titulos = {
                dashboard: ["Dashboard", "Resumen general"],
                anuncios: ["Anuncios", "Gestiona los anuncios de tu iglesia"],
                miembros: ["Miembros", "Directorio de miembros"],
                celulas: ["Células", "Gestión de células y reportes"],
                asistencia: ["Asistencia", "Registro de asistencia"],
                finanzas: ["Finanzas", "Diezmos y ofrendas"],
                configuracion: ["Configuración", "Ajustes del sistema"]
            };

            document.getElementById("tituloSeccion").textContent = titulos[seccion][0];
            document.getElementById("subtituloSeccion").textContent = titulos[seccion][1];

            if (seccion === "dashboard") cargarDashboard()
            if (seccion === "anuncios") cargarAnuncios()
            if (seccion === "miembros") cargarMiembros()
            if (seccion === "celulas") {
                cargarCelulas()
                cargarCelulasSelect()
            }

        }
        
        // Funcion para el menu lateral
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const btnToggle = document.getElementById("btnToggle");
            
            // Elementos del logo
            const logoHeaderContainer = document.getElementById("logo-header-container");
            const logoInnerFlex = document.querySelector(".logo-inner-flex");

            // Textos a ocultar
            const textosAOcultar = document.querySelectorAll(".nav-texto, .sidebar-extra");
            
            // 🔴 CORRECCIÓN AQUÍ: Apuntamos correctamente a los botones de navegación y a la sección ".border-t" (Cerrar sesión y Avatar)
            const elementosACentrar = document.querySelectorAll(".nav-btn, .border-t .flex, .border-t button");

            // --- Lógica de Colapso ---
            const esColapsado = sidebar.classList.toggle("w-16");
            sidebar.classList.toggle("w-64");

            // --- NUEVO: Girar la flecha flotante ---
            const iconoToggle = document.getElementById("icono-toggle");
            if (iconoToggle) {
                if (esColapsado) {
                    // Estado colapsado: Volteamos la flecha 180 grados
                    iconoToggle.classList.add("rotate-180"); 
                } else {
                    // Estado expandido: Quitamos la rotación
                    iconoToggle.classList.remove("rotate-180");
                }
            }
            
            // Ocultar textos
            textosAOcultar.forEach(t => {
                t.classList.toggle("hidden", esColapsado); 
                if(esColapsado) {
                    t.classList.add('w-0', 'invisible');
                } else {
                    t.classList.remove('hidden', 'w-0', 'invisible');
                }
            });

            // Centrar iconos del menú, el avatar y el botón de cerrar sesión
            elementosACentrar.forEach(elemento => {
                if (esColapsado) {
                    // Quitamos espaciados y forzamos el centro
                    elemento.classList.remove("justify-start", "px-4", "gap-3", "text-left");
                    elemento.classList.add("justify-center", "px-0");
                } else {
                    // Restauramos diseño original
                    elemento.classList.remove("justify-center", "px-0");
                    elemento.classList.add("justify-start", "px-4", "gap-3", "text-left");
                }
            });

            // Manejo del LOGO
            if (logoHeaderContainer && logoInnerFlex) {
                if (esColapsado) {
                    logoHeaderContainer.classList.remove("p-6");
                    logoHeaderContainer.classList.add("p-2"); 
                    logoInnerFlex.classList.remove("gap-3");
                    logoInnerFlex.classList.add("justify-center");
                } else {
                    logoHeaderContainer.classList.add("p-6");
                    logoHeaderContainer.classList.remove("p-2");
                    logoInnerFlex.classList.add("gap-3");
                    logoInnerFlex.classList.remove("justify-center");
                }
            }

            // Mover el Botón Flotante
            if (btnToggle) {
                btnToggle.textContent = esColapsado ? "▶" : "◀";
                btnToggle.style.left = esColapsado ? "52px" : "252px";
            }    
        }

        // Cerrar sesión
        function cerrarSesion() {
            localStorage.clear()
            window.location.href = "/login"
        }

        // Anuncios
        async function cargarAnuncios() {
            const respuesta = await fetch(`${API}/anuncios`, { headers }) 
            const datos = await respuesta.json()
            
            const lista = document.getElementById("listaAnuncios")
            lista.innerHTML = ""
            datos.forEach(anuncio => {
                const contenedor = document.createElement("div")
                contenedor.className = "flex items-center justify-between py-3 border-b"
                contenedor.style.borderColor = "#4a6478"
                const texto = document.createElement("span")
                texto.textContent = anuncio.texto
                texto.style.color = "#e8e0d0"
                const botones = document.createElement("div")
                
                const btnEliminar = document.createElement("button")
                btnEliminar.textContent = "Eliminar"
                btnEliminar.className = "px-3 py-1 rounded-lg text-sm ml-2"
                btnEliminar.style.backgroundColor = "#4a2030"
                btnEliminar.style.color = "#e8e0d0"
                btnEliminar.addEventListener("click", () => eliminarAnuncio(anuncio.id))
                
                const btnEditar = document.createElement("button")
                btnEditar.textContent = "Editar"
                btnEditar.className = "px-3 py-1 rounded-lg text-sm ml-2"
                btnEditar.style.backgroundColor = "#4a6478"
                btnEditar.style.color = "#e8e0d0"
                btnEditar.addEventListener("click", () => {
                    const nuevoTexto = prompt("Nuevo texto:", anuncio.texto)
                    if (nuevoTexto) updateAnuncio(anuncio.id, nuevoTexto)
                })
                
                botones.appendChild(btnEditar)
                botones.appendChild(btnEliminar)

            datos.forEach(celula => {

                option.dataset.sector = celula.sector || ""
                option.dataset.zona = celula.zona || ""
                select.appendChild(option)
            })

            // Al cambiar la célula, actualizar los campos automáticamente
            select.addEventListener("change", function() {
                const opcionSeleccionada = select.options[select.selectedIndex]
                document.getElementById("r_nombre_lider").value = opcionSeleccionada.dataset.lider

        // Exportar PDF
        async function exportarPDF(id, datosExternos = null) {
            const logo = document.getElementById('logo_iafcj')

            let reporte
            if (datosExternos) {
                reporte = datosExternos
            } else {
                const respuesta = await fetch(`${API}/reportes`, { headers })
                const datos = await respuesta.json()
                reporte = datos.find(r => r.id === id)
                if (!reporte) return
            }

            const { jsPDF } = window.jspdf
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' })

            const W = 215.9
            const azul     = [30, 58, 90]
            const azulMid  = [52, 90, 130]
            const azulClaro= [210, 224, 237]
            const gris     = [245, 247, 249]
            const blanco   = [255, 255, 255]
            const negro    = [20, 20, 20]
            const lineColor= [180, 195, 210]

            // ── Header azul oscuro ──
            doc.setFillColor(...azul)
            doc.rect(8, 8, W - 16, 22, 'F')

            doc.addImage(logo, 'PNG', 11, 9.5, 28, 18)

            doc.setTextColor(...blanco)
            doc.setFont("helvetica", "bold")
            doc.setFontSize(9.5)
            doc.text("IGLESIA APOSTÓLICA DE LA FE EN CRISTO JESÚS, A. R.", W / 2, 17, { align: "center" })
            doc.setFontSize(12)
            doc.text("REPORTE DE CÉLULA SEMANAL", W / 2, 25, { align: "center" })

            doc.autoTable({
                startY: 32,
                margin: { left: 8, right: 8 },
                tableWidth: W - 16,
                theme: 'grid',
                styles: { fontSize: 7.5, cellPadding: 2, textColor: negro, lineColor: lineColor, lineWidth: 0.3 },
                columnStyles: {
                    0: { fontStyle: 'bold', fillColor: azulClaro, cellWidth: 30 },
                    1: { cellWidth: 24, fillColor: blanco },
                    2: { fontStyle: 'bold', fillColor: azulClaro, cellWidth: 30 },
                    3: { cellWidth: 24, fillColor: blanco },
                    4: { fontStyle: 'bold', fillColor: azulClaro, cellWidth: 38 },
                    5: { cellWidth: 24, fillColor: blanco },
                    6: { fontStyle: 'bold', fillColor: azulClaro, cellWidth: 20 },
                    7: { fillColor: blanco },
                },
                body: [
                    ["CÉLULA No.", reporte.celulas?.nombre || "—", "RED", reporte.celulas?.red || "—", "SECTOR", reporte.celulas?.sector || "—", "ZONA", reporte.celulas?.zona || "—"],
                    ["N. LÍDER", { content: reporte.celulas?.nombre_lider || "—", colSpan: 3 }, "N. ASISTENTE", { content: reporte.celulas?.nombre_asistente || "—", colSpan: 3 }],
                    ["N. ANFITRIÓN", { content: reporte.celulas?.nombre_anfitrion || "—", colSpan: 3 }, "FECHA", { content: reporte.fecha || "—", colSpan: 3 }],
                ]
            })

            const y0 = doc.lastAutoTable.finalY
            doc.setFillColor(...azul)
            doc.rect(8, y0, W - 16, 8, 'F')
            doc.setTextColor(...blanco)
            doc.setFont("helvetica", "bold")
            doc.setFontSize(9)
            doc.text("REUNIONES Y PROCESOS", W / 2, y0 + 5.5, { align: "center" })

            const colLeft  = 8
            const colMid   = W / 2 + 1
            const colW     = (W - 16) / 2 - 1
            let yL = y0 + 10
            let yR = y0 + 10

            const rowH   = 5.5
            const headH  = 6.5

            function drawSectionHeader(x, y, w, label) {
                doc.setFillColor(...azulMid)
                doc.rect(x, y, w, headH, 'F')
                doc.setTextColor(...blanco)
                doc.setFont("helvetica", "bold")
                doc.setFontSize(7.5)
                doc.text(label, x + w / 2, y + 4.5, { align: "center" })
                doc.setDrawColor(...lineColor)
                doc.setLineWidth(0.3)
                doc.rect(x, y, w, headH)
                return y + headH
            }

            function drawRow(x, y, w, label, value, shade) {
                if (shade) doc.setFillColor(...gris)
                else doc.setFillColor(...blanco)
                doc.rect(x, y, w, rowH, 'F')
                doc.setDrawColor(...lineColor)
                doc.setLineWidth(0.2)
                doc.rect(x, y, w, rowH)
                doc.setTextColor(...negro)
                doc.setFont("helvetica", "normal")
                doc.setFontSize(7)
                doc.text(label, x + 2, y + 3.8)
                doc.setFont("helvetica", "bold")
                doc.text(String(value ?? 0), x + w - 2, y + 3.8, { align: "right" })
                return y + rowH
            }

            yL = drawSectionHeader(colLeft, yL, colW, "PLANEACIÓN")
            yL = drawRow(colLeft, yL, colW, "Miembros asistentes", reporte.miembros_asistentes, false)
            yL = drawRow(colLeft, yL, colW, "Miembros faltantes",  reporte.miembros_faltantes, true)

            yL = drawSectionHeader(colLeft, yL + 1, colW, "PROCESO DE GANAR")
            yL = drawRow(colLeft, yL, colW, "Padres Espirituales",      reporte.padres_espirituales, false)
            yL = drawRow(colLeft, yL, colW, "Amigos contactados",       reporte.amigos_contactados, true)
            yL = drawRow(colLeft, yL, colW, "Amigos a la fiesta",       reporte.amigos_fiesta, false)
            yL = drawRow(colLeft, yL, colW, "Amigos al E. Restauración",reporte.amigos_restauracion, true)
            yL = drawRow(colLeft, yL, colW, "Amigos bautizados",        reporte.amigos_bautizados, false)

            yL = drawSectionHeader(colLeft, yL + 1, colW, "PROCESO DE CONSOLIDAR")
            yL = drawRow(colLeft, yL, colW, "Bautizados etapa 1",    reporte.bautizados_etapa1, false)
            yL = drawRow(colLeft, yL, colW, "Bautizados etapa 2",    reporte.bautizados_etapa2, true)
            yL = drawRow(colLeft, yL, colW, "Bautizados etapa 3",    reporte.bautizados_etapa3, false)
            yL = drawRow(colLeft, yL, colW, "Re-encuentro",          reporte.reencuentro, true)
            yL = drawRow(colLeft, yL, colW, "Escuela ECO",           reporte.escuela_eco, false)
            yL = drawRow(colLeft, yL, colW, "Escuela de Ministerios",reporte.escuela_ministerios, true)

            yL = drawSectionHeader(colLeft, yL + 1, colW, "PROCESO DE DISCIPULADO")
            yL = drawRow(colLeft, yL, colW, "Célula a multiplicarse",       reporte.celula_multiplicarse ? "Sí" : "No", false)
            yL = drawRow(colLeft, yL, colW, "Padres Espirituales N/célula", reporte.padres_espirituales_ncelula, true)
            yL = drawRow(colLeft, yL, colW, "Niños",                        reporte.ninos_discipulado, false)
            yL = drawRow(colLeft, yL, colW, "Ofrendas MXN", `$${reporte.ofrendas_discipulado || 0}`, true)
            yL = drawRow(colLeft, yL, colW, "Ofrendas USD", `$${reporte.ofrendas_discipulado_usd || 0}`, false)

            yR = drawSectionHeader(colMid, yR, colW, "ALCANCE")
            yR = drawRow(colMid, yR, colW, "Miembros asistentes",    reporte.miembros_asistentes_alcance, false)
            yR = drawRow(colMid, yR, colW, "Miembros c/privilegios", reporte.miembros_privilegios, true)
            yR = drawRow(colMid, yR, colW, "Amigos asistentes",      reporte.amigos_asistentes, false)
            yR = drawRow(colMid, yR, colW, "Jóvenes asistentes",     reporte.jovenes_asistentes, true)
            yR = drawRow(colMid, yR, colW, "Adolescentes asistentes",reporte.adolescentes_asistentes, false)
            yR = drawRow(colMid, yR, colW, "Conversiones",           reporte.conversiones, true)
            yR = drawRow(colMid, yR, colW, "Niños",                  reporte.ninos_alcance, false)
            yR = drawRow(colMid, yR, colW, "Ofrenda MXN", `$${reporte.ofrenda_alcance || 0}`, true)
            yR = drawRow(colMid, yR, colW, "Ofrenda USD", `$${reporte.ofrenda_alcance_usd || 0}`, false)

            yR = drawSectionHeader(colMid, yR + 1, colW, "CULTO DOMINGO")
            yR = drawRow(colMid, yR, colW, "Miembros asistentes", reporte.miembros_culto, false)
            yR = drawRow(colMid, yR, colW, "Adolescentes",        reporte.adolescentes_culto, true)
            yR = drawRow(colMid, yR, colW, "Niños",               reporte.ninos_culto, false)
            yR = drawRow(colMid, yR, colW, "Jóvenes",             reporte.jovenes_culto, true)
            yR = drawRow(colMid, yR, colW, "Amigos asistentes",   reporte.amigos_culto, false)

            yR = drawSectionHeader(colMid, yR + 1, colW, "OBSERVACIONES")
            const obsH = Math.max(yL - yR, 15)
            doc.setFillColor(...blanco)
            doc.setDrawColor(...lineColor)
            doc.setLineWidth(0.3)
            doc.rect(colMid, yR, colW, obsH, 'FD')
            if (reporte.observaciones) {
                doc.setTextColor(...negro)
                doc.setFont("helvetica", "normal")
                doc.setFontSize(7)
                const lines = doc.splitTextToSize(reporte.observaciones, colW - 4)
                doc.text(lines, colMid + 2, yR + 4)
            }
            yR += obsH

            console.log('ofrenda_pesos:', reporte.ofrenda_pesos)
            console.log('ofrenda_dolares:', reporte.ofrenda_dolares)

            const yFinal = Math.max(yL, yR) + 2
            doc.setFillColor(...azul)
            doc.rect(8, yFinal, W - 16, 8, 'F')
            doc.setTextColor(...blanco)
            doc.setFont("helvetica", "bold")
            doc.setFontSize(8)
            doc.text("TOTAL OFRENDA", 20, yFinal + 5.5)
            doc.text(`MXN: $${parseFloat(reporte.ofrenda_pesos) || 0}     USD: $${parseFloat(reporte.ofrenda_dolares) || 0}`, W - 12, yFinal + 5.5, { align: "right" })

            const alturaTotal = yFinal + 8 - 8
            doc.setDrawColor(...lineColor)
            doc.setLineWidth(0.6)
            doc.rect(8, 8, W - 16, alturaTotal)

            doc.save(`reporte-${reporte.celulas?.nombre || 'general'}-${reporte.fecha}.pdf`)
        }

        function seleccionarTodos(valor) {
            document.querySelectorAll('.reporte-check').forEach(cb => cb.checked = valor)
        }

        // Funcion de exportar el total general de reportes

            const checks = document.querySelectorAll('.reporte-check:checked')
            if (checks.length === 0) {
                alert("Selecciona al menos un reporte")
                return
            }

            const ids = Array.from(checks).map(cb => parseInt(cb.dataset.id))
            const seleccionados = window._reportesData.filter(r => ids.includes(r.id))
            const suma = (campo) => seleccionados.reduce((acc, r) => acc + (r[campo] || 0), 0)

            const fechas = seleccionados.map(r => r.fecha).sort()

            // Arma el objeto con el mismo formato que un reporte individual
            const reporteGeneral = {
                celulas: {

                amigos_bautizados: suma("amigos_bautizados"),
                bautizados_etapa1: suma("bautizados_etapa1"),
                bautizados_etapa2: suma("bautizados_etapa2"),
                bautizados_etapa3: suma("bautizados_etapa3"),
                reencuentro: suma("reencuentro"),
                escuela_eco: suma("escuela_eco"),
                escuela_ministerios: suma("escuela_ministerios"),
                celula_multiplicarse: false,
                padres_espirituales_ncelula: suma("padres_espirituales_ncelula"),
                ninos_discipulado: suma("ninos_discipulado"),
                ofrendas_discipulado: suma("ofrendas_discipulado"),
                ofrendas_discipulado_usd: suma("ofrendas_discipulado_usd"),
                miembros_asistentes_alcance: suma("miembros_asistentes_alcance"),

                miembros_culto: suma("miembros_culto"),
                adolescentes_culto: suma("adolescentes_culto"),
                ninos_culto: suma("ninos_culto"),
                jovenes_culto: suma("jovenes_culto"),
                amigos_culto: suma("amigos_culto"),
                ofrenda_pesos: suma("ofrenda_pesos"),
                ofrenda_dolares: suma("ofrenda_dolares"),
                observaciones: `Reporte consolidado de ${seleccionados.length} células`
            }

            exportarPDF(null, reporteGeneral)
        }

        document.getElementById("btnEnviar").addEventListener("click", async function() {
            const texto = document.getElementById("textoAnuncio").value
            if (!texto) return
            await fetch(`${API}/anuncios`, {
                method: "POST",
                headers: headers, 
                body: JSON.stringify({ texto })
            })
            document.getElementById("textoAnuncio").value = ""
            cargarAnuncios()
        })

        async function eliminarAnuncio(id) {
            if(!confirm("¿Estás seguro de eliminar este anuncio?")) return;

            await fetch(`${API}/anuncios`, {
                method: "DELETE",
                headers: headers, 
                body: JSON.stringify({ id })
            })
            cargarAnuncios()
        }

        async function updateAnuncio(id, nuevoTexto) {
            await fetch(`${API}/anuncios`, {
                method: "PUT",
                headers: headers, 
                body: JSON.stringify({ elID: id, nuevo_texto: nuevoTexto })
            })
            cargarAnuncios()
        }

        // Iniciar
        cargarDashboard()
    </script>
